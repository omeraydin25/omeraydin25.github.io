<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sosyal Medya Büyütme</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .box {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🚀 Sosyal Medya Büyütme</h1>
    <p>Instagram, TikTok ve YouTube büyütme taktikleri</p>
    <button class="btn" onclick="alert('Yakında içerikler eklenecek!')">
      Başla
    </button>
  </div>

</body>
</html>
