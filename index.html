<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sosyal Medya Rehberi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <header>
    🚀 Sosyal Medya Büyütme
  </header>

  <div class="container">
    <h1>Keşfete Çıkmanın Yolları</h1>
    <p>Instagram, TikTok ve YouTube büyütme rehberi</p>

    <button class="btn" onclick="alert('İçerikler yakında!')">
      Başla
    </button>
  </div>

</body>
</html>
