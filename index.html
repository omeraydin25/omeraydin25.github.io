<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>baydınsal.oyunhizmetleri</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  text-align:center;
  padding-top:120px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px 20px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e293b;
}

.menu{
  cursor:pointer;
  font-size:22px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:0.3s;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:15px 0;
}

/* MAIN */
.container{
  text-align:center;
  padding:40px;
}

.card{
  background:#1e293b;
  margin:10px auto;
  width:200px;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}
</style>

<script>
function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

function menu(){
  let m=document.getElementById("side");
  m.style.right = (m.style.right=="0px") ? "-260px":"0px";
}

function openPage(x){
  alert(x + " paneli (demo) açıldı");
}
</script>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Giriş / Kayıt</h2>
  <input placeholder="Kullanıcı adı"><br>
  <input placeholder="Şifre" type="password"><br>
  <button onclick="login()">Giriş Yap</button>
  <p>Şifremi unuttum</p>
  <p>KVKK Metni</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="topbar">
    <div>baydınsal.oyunhizmetleri</div>
    <div class="menu" onclick="menu()">☰</div>
  </div>

  <div id="side" class="sidebar">
    <a href="#">Kategoriler</a>
    <a href="#">Satın Alma Geçmişi</a>
    <a href="#">Favoriler</a>
    <a href="#">Çıkış</a>
  </div>

  <div class="container">
    <h1>Hoş Geldin 👋</h1>
    <p>Kullanıcı: Demo Kullanıcı</p>

    <div class="card" onclick="openPage('Instagram')">
      Instagram<br>Beğeni / Görüntülenme (demo)
    </div>

    <div class="card" onclick="openPage('TikTok')">
      TikTok<br>İzlenme / Takip (demo)
    </div>

    <div class="card" onclick="openPage('Telegram')">
      Telegram (demo)
    </div>

    <div class="card" onclick="openPage('YouTube')">
      YouTube (demo)
    </div>
  </div>

</div>

</body>
</html>
